<!doctype html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Icon Kullanımı" />
    <meta name="author" content="Icon Kullanımı" />

    <!-- Title -->
    <title>Icon Kullanımı</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:400,400italic,700,700italic"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS (Local) -->
    <link rel="stylesheet" href="../css/bootstrap.min.css" />

    <!-- Font Awesome (Local CSS Version) -->
    <link rel="stylesheet" href="../css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/10-Icon_Kullanımı.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="mt-5 title-heading">Bootstrap İkon Kullanımı</h2>
      <ul class="list-inline text-center my-5">
        <li class="list-inline-item">
          <a href="#">
            <i class="fas fa-home"></i>
            Ana Sayfa</a
          >
        </li>
        <li class="list-inline-item">
          <a href="#">
            <i class="fas fa-info-circle"></i>
            Hakkımızda</a
          >
        </li>
        <li class="list-inline-item">
          <a href="#">
            <i class="fas fa-cogs"></i>
            Hizmetlerimiz</a
          >
        </li>
        <li class="list-inline-item">
          <a href="#">
            <i class="fas fa-phone"></i>
            İletişim</a
          >
        </li>
      </ul>
      <div class="text-center">
        <button class="btn btn-primary">
          <i class="fas fa-download"></i>
          İndir
        </button>
        <button class="btn btn-success">
          <i class="fas fa-check"></i>
          Onayla
        </button>
        <button class="btn btn-danger">
          <i class="fas fa-trash-alt"></i>
          Sil
        </button>
      </div>

      <p class="mt-5 text-center">
        <i class="fas fa-heart"></i>
        Bootstrap İkon Kullanımı
      </p>

      <div class="text-center mt-5">
        <i class="fas fa-star fa-2x"></i>
        <i class="fas fa-star fa-3x"></i>
        <i class="fas fa-star fa-4x"></i>
      </div>

      <h1 class="mt-5 text-center">
        <i class="fas fa-smile"></i>
        İkonlarla Başarı
      </h1>
    </div>

    <!-- container -->

    <!-- JS local -->
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/Main.js"></script>
    <!-- cdn -->
    <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
  </body>
</html>
