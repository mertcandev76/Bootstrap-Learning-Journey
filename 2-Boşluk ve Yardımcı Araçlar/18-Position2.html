<!doctype html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Position 2" />
    <meta name="author" content="Position 2" />

    <!-- Title -->
    <title>Position 2</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:400,400italic,700,700italic"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS (Local) -->
    <link rel="stylesheet" href="../css/bootstrap.min.css" />

    <!-- Font Awesome (Local CSS Version) -->
    <link rel="stylesheet" href="../css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/18-Position2.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="title-heading">Positon 2</h2>

      <!-- Relative Container -->
      <h3 class="mt-4">1. Position Relative</h3>

      <div class="position-relative demo-box p-3">
        Bu container position-relative kullanıyor.
      </div>

      <!-- Absolute -->
      <h3 class="mt-5">2. Position Absolute</h3>

      <div class="position-relative demo-box">
        <div class="position-absolute top-0 start-0 bg-primary text-white p-2">
          Sol Üst
        </div>

        <div class="position-absolute top-0 end-0 bg-success text-white p-2">
          Sağ Üst
        </div>

        <div
          class="position-absolute bottom-0 start-0 bg-warning text-dark p-2"
        >
          Sol Alt
        </div>

        <div class="position-absolute bottom-0 end-0 bg-danger text-white p-2">
          Sağ Alt
        </div>
      </div>

      <!-- Relative + Absolute Birlikte -->
      <h3 class="mt-5">3. Relative ve Absolute Birlikte Kullanımı</h3>

      <div class="card position-relative my-3" style="width: 18rem">
        <img src="../assets/img/portfolio/cake.png" class="card-img-top" />

        <div class="card-body">
          <h5 class="card-title">Kart Başlığı</h5>
          <p class="card-text">Kart içeriği burada.</p>
        </div>

        <span
          class="position-absolute top-0 start-100 translate-middle badge bg-danger"
        >
          Yeni
        </span>
      </div>
    </div>
    <!-- container -->

    <!-- JS local -->
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/Main.js"></script>
    <!-- cdn -->
    <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
  </body>
</html>
